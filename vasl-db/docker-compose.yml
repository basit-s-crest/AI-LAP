version: "3.9"

# ============================================================
# Local development stack
# Mirrors the production topology without TLS/auth overhead.
# Run: docker compose up -d
# ============================================================

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: vasl_postgres
    environment:
      POSTGRES_DB:       vasl
      POSTGRES_USER:     vasl_user
      POSTGRES_PASSWORD: vasl_local_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Run all migrations automatically on first start
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vasl_user -d vasl"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vasl_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Zookeeper (required by Kafka) ────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: vasl_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka ────────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: vasl_kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:                zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS:             PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:   PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME:       PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:        "false"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ── Kafka topic setup (runs once then exits) ─────────────────────────────────
  kafka-setup:
    image: confluentinc/cp-kafka:7.6.0
    container_name: vasl_kafka_setup
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic alap.text.raw \
        --partitions 3 \
        --replication-factor 1 \
        --config retention.ms=86400000 \
        --config cleanup.policy=delete \
        --config compression.type=zstd

      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic alap.text.annotated \
        --partitions 3 \
        --replication-factor 1 \
        --config retention.ms=7776000000 \
        --config cleanup.policy=delete \
        --config compression.type=zstd

      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic alap.text.dlq \
        --partitions 1 \
        --replication-factor 1 \
        --config retention.ms=604800000

      echo 'Topics created.'
      "
    restart: "no"

  # ── Kafka consumer service ───────────────────────────────────────────────────
  consumer:
    build:
      context: ./consumer
      dockerfile: Dockerfile
    container_name: vasl_consumer
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file: .env
    restart: unless-stopped

volumes:
  postgres_data:
