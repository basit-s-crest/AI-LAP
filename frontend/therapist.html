<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VASL — Therapist Dashboard</title>
  <style>
    body { font-family: sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; }
    h1 { font-size: 20px; font-weight: 500; }
    .search-bar { display: flex; gap: 10px; margin: 20px 0; }
    .search-bar input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    .search-bar button { padding: 8px 20px; background: #185FA5; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    .summary-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 20px 0; }
    .card { background: #f5f5f5; padding: 16px; border-radius: 8px; }
    .card .label { font-size: 12px; color: #888; }
    .card .value { font-size: 24px; font-weight: 500; margin-top: 4px; }
    .risk-badge { display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: 500; }
    .risk-low      { background: #EAF3DE; color: #3B6D11; }
    .risk-moderate { background: #FAEEDA; color: #854F0B; }
    .risk-high     { background: #FCEBEB; color: #A32D2D; }
    .risk-crisis   { background: #A32D2D; color: #fff; }
    .event-row { border: 1px solid #eee; border-radius: 8px; padding: 14px; margin: 10px 0; }
    .event-row .meta { font-size: 12px; color: #888; margin-bottom: 6px; }
    .signal-pill { display: inline-block; background: #E6F1FB; color: #0C447C; font-size: 11px; padding: 2px 8px; border-radius: 10px; margin: 2px; }
    .shap-item { font-size: 12px; color: #555; margin: 2px 0; }
    .error { color: #A32D2D; padding: 12px; background: #FCEBEB; border-radius: 6px; }
    .loader { color: #888; font-size: 14px; }
  </style>
</head>
<body>

  <h1>Therapist Dashboard</h1>

  <div class="search-bar">
    <input type="text" id="token-input" placeholder="Enter member token e.g. mbr_a3f9c2d8e1" />
    <button onclick="loadMember()">Load Member</button>
  </div>

  <div id="output"></div>

  <script>
    const API_BASE = "http://localhost:8000";  // ← change to your server URL in production

    async function loadMember() {
      const token = document.getElementById("token-input").value.trim();
      const out   = document.getElementById("output");

      if (!token) { out.innerHTML = '<p class="error">Please enter a member token.</p>'; return; }

      out.innerHTML = '<p class="loader">Loading...</p>';

      try {
        const res  = await fetch(`${API_BASE}/v1/results/member/${token}`);
        const data = await res.json();

        if (!res.ok) {
          out.innerHTML = `<p class="error">Error: ${data.detail || res.statusText}</p>`;
          return;
        }

        out.innerHTML = renderMember(data);

      } catch (e) {
        out.innerHTML = `<p class="error">Could not reach API: ${e.message}</p>`;
      }
    }

    function renderMember(d) {
      return `
        <div class="summary-cards">
          <div class="card">
            <div class="label">Current risk tier</div>
            <div class="value">
              <span class="risk-badge risk-${d.current_risk_tier || 'low'}">
                ${d.current_risk_tier || 'N/A'}
              </span>
            </div>
          </div>
          <div class="card">
            <div class="label">Risk score</div>
            <div class="value">${d.current_risk_score != null ? (d.current_risk_score * 100).toFixed(0) + '%' : 'N/A'}</div>
          </div>
          <div class="card">
            <div class="label">Total events</div>
            <div class="value">${d.total_events}</div>
          </div>
        </div>

        <h2 style="font-size:16px;font-weight:500;margin:20px 0 10px">
          Events — trend: ${d.risk_trend || 'unknown'}
          ${d.pending_reviews > 0 ? `<span style="color:#A32D2D;font-size:13px;margin-left:10px">${d.pending_reviews} pending review(s)</span>` : ''}
        </h2>

        ${d.events.map(ev => `
          <div class="event-row">
            <div class="meta">
              ${new Date(ev.event_timestamp).toLocaleString()} &nbsp;·&nbsp;
              ${ev.source_type} &nbsp;·&nbsp;
              ${ev.clinician_reviewed ? '✓ reviewed' : '<span style="color:#A32D2D">awaiting review</span>'}
            </div>
            <span class="risk-badge risk-${ev.risk_tier}">${ev.risk_tier}</span>
            <span style="font-size:13px;color:#555;margin-left:8px">score: ${(ev.risk_score * 100).toFixed(0)}%</span>

            ${ev.signals.length ? `
              <div style="margin-top:8px">
                ${ev.signals.map(s => `<span class="signal-pill">${s.signal_code} ${s.signal_label || ''} (${(s.confidence * 100).toFixed(0)}%)</span>`).join('')}
              </div>` : ''}

            ${ev.shap_attributions.length ? `
              <div style="margin-top:6px;font-size:12px;color:#888">
                Top tokens: ${ev.shap_attributions.slice(0,3).map(sh => `"${sh.span}" (${sh.weight.toFixed(2)})`).join(' · ')}
              </div>` : ''}

            ${ev.recommended_action ? `<div style="margin-top:6px;font-size:12px;color:#185FA5">Action: ${ev.recommended_action}</div>` : ''}
          </div>
        `).join('')}
      `;
    }

    // Allow pressing Enter to search
    document.getElementById("token-input").addEventListener("keydown", e => {
      if (e.key === "Enter") loadMember();
    });
  </script>

</body>
</html>
