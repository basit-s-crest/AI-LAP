version: "3.9"

# ============================================================
# VASL ALAP — Local development stack
# Services: Postgres, Redis
# Run: docker compose up -d
# ============================================================

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: vasl_postgres
    environment:
      POSTGRES_DB:       vasl
      POSTGRES_USER:     vasl_user
      POSTGRES_PASSWORD: vasl_local_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # All *.sql files in migrations/ run in filename order (V1→V13)
      # on first start when the data volume is empty.
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vasl_user -d vasl"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis (crisis alert pub/sub) ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vasl_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:   # Postgres tables and data
  redis_data:      # Redis AOF persistence
